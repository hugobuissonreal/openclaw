<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw · Architecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b0f14;--bg2:#0b0f14;--panel:#151a21;--line:#2a313b;--text:#f5f7fb;--muted:#98a2b3;--accent:#ff6d5a;--accent2:#79d7bd;--folder:#d5ad6b;--shadow:0 20px 60px rgba(0,0,0,.35);--radius:20px}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);font-family:Inter,system-ui,sans-serif}.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.side{border-right:1px solid rgba(255,255,255,.05);padding:24px 18px;position:sticky;top:0;height:100vh;background:rgba(11,15,20,.94);backdrop-filter:blur(14px)}.brand{font-size:20px;font-weight:800;letter-spacing:-.04em;margin-bottom:28px}.nav{display:grid;gap:8px}.nav a{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid transparent;border-radius:14px;color:var(--muted);font-size:14px}.nav a.active,.nav a:hover{background:rgba(255,255,255,.03);border-color:var(--line);color:var(--text)}.ico{width:16px;height:16px;display:inline-block}.main{padding:28px}.shell{max-width:1180px}.head{display:flex;justify-content:space-between;align-items:end;gap:16px;margin-bottom:22px}.title{font-size:42px;font-weight:800;letter-spacing:-.05em;line-height:.95}.sub{color:var(--muted);font-size:14px}.folders{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{background:linear-gradient(180deg,rgba(15,20,26,.95),rgba(11,16,21,.95));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}.folderTop{display:flex;align-items:center;gap:14px;margin-bottom:18px}.folderIcon{width:50px;height:36px;border-radius:11px 11px 10px 10px;background:linear-gradient(180deg,#f0c87b,#cda25b);position:relative;box-shadow:0 10px 22px rgba(205,162,91,.16)}.folderIcon:before{content:"";position:absolute;top:-7px;left:8px;width:20px;height:10px;border-radius:7px 7px 0 0;background:#dfb86d}.card h2{margin:0;font-size:20px;letter-spacing:-.03em}.meta{color:var(--muted);font-size:13px}.cta{display:inline-flex;margin-top:14px;padding:10px 14px;border:1px solid var(--line);border-radius:999px;color:var(--text);font-size:13px}.miniSchema{margin-top:26px;padding:22px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.02)}.row{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;align-items:center;gap:12px}.node{padding:16px;border:1px solid var(--line);border-radius:16px;text-align:center;background:rgba(255,255,255,.02)}.node b{display:block;margin-bottom:4px}.arrow{color:var(--accent);font-size:20px;text-align:center}.footer{margin-top:24px;color:var(--muted);font-size:12px}@media (max-width:980px){.app{grid-template-columns:1fr}.side{position:relative;height:auto;border-right:0;border-bottom:1px solid rgba(255,255,255,.05)}.folders,.row{grid-template-columns:1fr}.arrow{display:none}.main{padding:20px}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">OpenClaw</div>
      <nav class="nav">
        <a class="active" href="./index.html"><span class="ico">◫</span><span>Architecture</span></a>
        <a href="./agents.html"><span class="ico">◎</span><span>Agents</span></a>
        <a href="./arborescence.html"><span class="ico">▣</span><span>Arborescence</span></a>
      </nav>
    </aside>
    <main class="main"><div class="shell">
      <div class="head"><div><div class="title">Architecture</div></div></div>

      <section class="folders">
        <div class="card">
          <div class="folderTop"><div class="folderIcon"></div><div><h2>Agents</h2><div class="meta">Hiérarchie agentique</div></div></div>
          <a class="cta" href="./agents.html">Ouvrir</a>
        </div>
        <div class="card">
          <div class="folderTop"><div class="folderIcon"></div><div><h2>Arborescence</h2><div class="meta">Workspace + Supabase</div></div></div>
          <a class="cta" href="./arborescence.html">Ouvrir</a>
        </div>
        <div class="card">
          <div class="folderTop"><div class="folderIcon"></div><div><h2>Global</h2><div class="meta">Contexte partagé</div></div></div>
          <div class="meta">Context · System · Memory · Ops</div>
        </div>
      </section>

      

      <div class="footer"></div>
    </div></main>
  </div>
</body>
</html>
