<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw · Agents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#07090c;--bg2:#0d1117;--panel:#0f141a;--line:#213040;--text:#f4f7fb;--muted:#8f9baa;--accent:#8fb7ff;--ceo:#ff8a5b;--manager:#8fb7ff;--worker:#78d5bb;--shadow:none;--radius:20px}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;overflow:hidden}a{text-decoration:none;color:inherit}
    .app{display:grid;grid-template-columns:240px 1fr;height:100vh}.side{border-right:1px solid rgba(255,255,255,.05);padding:24px 18px;background:rgba(5,7,10,.97);backdrop-filter:blur(14px)}
    .brand{font-size:20px;font-weight:800;letter-spacing:-.04em;margin-bottom:28px}.nav{display:grid;gap:8px}.nav a{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid transparent;border-radius:14px;color:var(--muted);font-size:14px}.nav a.active,.nav a:hover{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.08);color:var(--text)}
    .main{display:grid;grid-template-rows:auto 1fr;padding:20px 24px;gap:16px;min-width:0}.top{display:flex;justify-content:space-between;align-items:end;gap:16px}.title{font-size:42px;font-weight:800;letter-spacing:-.05em;line-height:.95}.sub{color:var(--muted);font-size:14px}.controls{display:flex;gap:10px;align-items:center}.btn{padding:10px 12px;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:rgba(255,255,255,.03);color:var(--text);cursor:pointer}.zoomLabel{color:var(--muted);font-size:13px;min-width:46px;text-align:right}
    .board{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.06);border-radius:24px;background:linear-gradient(180deg,rgba(13,17,23,.98),rgba(9,12,16,.98));box-shadow:none}
    .board:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);background-size:36px 36px;pointer-events:none}
    .viewport{position:absolute;inset:0;cursor:grab}.viewport.dragging{cursor:grabbing}.scene{position:absolute;left:0;top:0;transform-origin:0 0}
    svg{position:absolute;left:0;top:0;pointer-events:none}.link{fill:none;stroke:rgba(255,109,90,.28);stroke-width:2.2;stroke-dasharray:6 8;stroke-linecap:round}
    .node{position:absolute;width:188px;padding:16px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);box-shadow:0 14px 30px rgba(0,0,0,.22);backdrop-filter:blur(6px)}
    .node.ceo{width:260px;border-color:rgba(216,176,106,.36)}.node.manager{width:220px;border-color:rgba(143,183,255,.25)}.node.worker{border-color:rgba(120,213,187,.22)}
    .role{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px}.ceo .role{color:var(--ceo)}.manager .role{color:var(--manager)}.worker .role{color:var(--worker)}
    .name{font-size:24px;font-weight:800;letter-spacing:-.04em;margin-bottom:6px}.worker .name{font-size:18px}.meta{font-size:12px;color:var(--muted);line-height:1.45}
    .hint{position:absolute;right:16px;bottom:14px;color:var(--muted);font-size:12px;background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.06);padding:8px 10px;border-radius:999px}
    @media (max-width:980px){body{overflow:auto}.app{grid-template-columns:1fr;height:auto}.side{border-right:0;border-bottom:1px solid rgba(255,255,255,.05)}.main{min-height:100vh;padding:20px}.title{font-size:34px}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">OpenClaw</div>
      <nav class="nav">
        <a href="./index.html">◫ <span>Architecture</span></a>
        <a href="./agents.html" class="active">◎ <span>Agents</span></a>
        <a href="./arborescence.html">▣ <span>Arborescence</span></a>
      </nav>
    </aside>
    <main class="main">
      <div class="top">
        <div><div class="title">Agents</div></div>
        <div class="controls">
          <button class="btn" id="zoomOut">−</button>
          <button class="btn" id="reset">Reset</button>
          <button class="btn" id="zoomIn">+</button>
          <div class="zoomLabel" id="zoomLabel">100%</div>
        </div>
      </div>
      <section class="board">
        <div class="viewport" id="viewport">
          <div class="scene" id="scene">
            <svg id="links"></svg>
          </div>
        </div>
        <div class="hint">Glisser pour déplacer · molette pour zoomer</div>
      </section>
    </main>
  </div>
  <script>
    const data = {
      ceo: { name: 'Harold', meta: 'orchestration · arbitrage · vision système' },
      managers: [
        {
          name: 'Astrid',
          meta: 'supervision du pôle reels',
          workers: [
            ['Rustik', 'motivation reels'],
            ['Stoick', 'authority reels'],
            ['Snotlout', 'conversion reels'],
            ['Eret', 'proof reels'],
            ['Mildew', 'story reels']
          ]
        },
        {
          name: 'Valka',
          meta: 'supervision du pôle carousels',
          workers: [
            ['Ruffnut', 'conversion carousels'],
            ['Tuffnut', 'educational carousels'],
            ['Gobber', 'authority carousels'],
            ['Fishlegs', 'deep-dive carousels'],
            ['Heather', 'narrative carousels']
          ]
        }
      ]
    };

    const viewport = document.getElementById('viewport');
    const scene = document.getElementById('scene');
    const svg = document.getElementById('links');
    const zoomLabel = document.getElementById('zoomLabel');

    const sizes = {
      ceo: { w: 260, h: 98 },
      manager: { w: 220, h: 92 },
      worker: { w: 188, h: 86 }
    };

    const gap = { managerX: 260, workerX: 34, workerY: 150 };
    const layout = { top: 70, managerY: 260, workerY1: 500, workerY2: 670 };

    function makeNode(cls, role, name, meta, x, y, w) {
      const el = document.createElement('div');
      el.className = `node ${cls}`;
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      el.innerHTML = `<div class="role">${role}</div><div class="name">${name}</div><div class="meta">${meta}</div>`;
      scene.appendChild(el);
      return { el, x, y, w, h: cls === 'worker' ? sizes.worker.h : cls === 'manager' ? sizes.manager.h : sizes.ceo.h };
    }

    function path(points) {
      return points.map((p, i) => `${i ? 'L' : 'M'}${p[0]} ${p[1]}`).join(' ');
    }

    function link(points) {
      const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      p.setAttribute('class', 'link');
      p.setAttribute('d', path(points));
      svg.appendChild(p);
    }

    const groupWidth = (sizes.worker.w * 3) + (gap.workerX * 2);
    const centerX = 760;
    const leftGroupX = centerX - 380 - groupWidth / 2;
    const rightGroupX = centerX + 380 - groupWidth / 2;
    const managerLeftX = centerX - 380 - sizes.manager.w / 2;
    const managerRightX = centerX + 380 - sizes.manager.w / 2;
    const ceoX = centerX - sizes.ceo.w / 2;

    const ceo = makeNode('ceo', 'CEO', data.ceo.name, data.ceo.meta, ceoX, layout.top, sizes.ceo.w);
    const managers = [
      makeNode('manager', 'Manager · Reels', data.managers[0].name, data.managers[0].meta, managerLeftX, layout.managerY, sizes.manager.w),
      makeNode('manager', 'Manager · Carousels', data.managers[1].name, data.managers[1].meta, managerRightX, layout.managerY, sizes.manager.w)
    ];

    const groups = [leftGroupX, rightGroupX];
    const workerNodes = [[], []];

    data.managers.forEach((m, mi) => {
      m.workers.forEach((w, wi) => {
        const row = wi < 3 ? 0 : 1;
        const col = row === 0 ? wi : wi - 3;
        const colsInRow = row === 0 ? 3 : 2;
        const rowWidth = colsInRow * sizes.worker.w + (colsInRow - 1) * gap.workerX;
        const rowStart = groups[mi] + (groupWidth - rowWidth) / 2;
        const x = rowStart + col * (sizes.worker.w + gap.workerX);
        const y = row === 0 ? layout.workerY1 : layout.workerY2;
        workerNodes[mi].push(makeNode('worker', 'Worker', w[0], w[1], x, y, sizes.worker.w));
      });
    });

    const allNodes = [ceo, ...managers, ...workerNodes[0], ...workerNodes[1]];
    const sceneWidth = 1600;
    const sceneHeight = 960;
    scene.style.width = sceneWidth + 'px';
    scene.style.height = sceneHeight + 'px';
    svg.setAttribute('viewBox', `0 0 ${sceneWidth} ${sceneHeight}`);
    svg.setAttribute('width', sceneWidth);
    svg.setAttribute('height', sceneHeight);

    // CEO -> managers
    const ceoBottom = [ceo.x + ceo.w / 2, ceo.y + ceo.h];
    const splitY = 210;
    const leftMgrTop = [managers[0].x + managers[0].w / 2, managers[0].y];
    const rightMgrTop = [managers[1].x + managers[1].w / 2, managers[1].y];
    link([ceoBottom, [ceoBottom[0], splitY], [leftMgrTop[0], splitY], leftMgrTop]);
    link([ceoBottom, [ceoBottom[0], splitY], [rightMgrTop[0], splitY], rightMgrTop]);

    // Managers -> workers by grouped rows, avoiding overlaps
    managers.forEach((mgr, mi) => {
      const group = workerNodes[mi];
      const mgrBottom = [mgr.x + mgr.w / 2, mgr.y + mgr.h];
      const hubY = mgrBottom[1] + 55;
      const topRow = group.filter(n => n.y === layout.workerY1);
      const bottomRow = group.filter(n => n.y === layout.workerY2);
      const minTopX = Math.min(...topRow.map(n => n.x + n.w / 2));
      const maxTopX = Math.max(...topRow.map(n => n.x + n.w / 2));
      link([mgrBottom, [mgrBottom[0], hubY], [minTopX, hubY]]);
      link([[mgrBottom[0], hubY], [maxTopX, hubY]]);
      topRow.forEach(n => link([[n.x + n.w / 2, hubY], [n.x + n.w / 2, n.y]]));
      if (bottomRow.length) {
        const minBottomX = Math.min(...bottomRow.map(n => n.x + n.w / 2));
        const maxBottomX = Math.max(...bottomRow.map(n => n.x + n.w / 2));
        const hubY2 = layout.workerY2 - 46;
        link([[mgrBottom[0], hubY], [mgrBottom[0], hubY2], [minBottomX, hubY2]]);
        link([[mgrBottom[0], hubY2], [maxBottomX, hubY2]]);
        bottomRow.forEach(n => link([[n.x + n.w / 2, hubY2], [n.x + n.w / 2, n.y]]));
      }
    });

    let baseScale = 1;
    let scale = 1;
    let x = 0;
    let y = 0;
    let dragging = false;
    let startX = 0, startY = 0, originX = 0, originY = 0;

    function fitToViewport() {
      const rect = viewport.getBoundingClientRect();
      const fitX = (rect.width - 60) / sceneWidth;
      const fitY = (rect.height - 60) / sceneHeight;
      baseScale = Math.min(fitX, fitY, 1);
      scale = baseScale;
      x = (rect.width - sceneWidth * scale) / 2;
      y = 24;
      render();
    }
    function render() {
      scene.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
      zoomLabel.textContent = Math.round((scale / baseScale) * 100) + '%';
    }
    function clampScale(v) { return Math.max(baseScale * 0.65, Math.min(baseScale * 2.2, v)); }

    viewport.addEventListener('mousedown', (e) => {
      dragging = true; viewport.classList.add('dragging');
      startX = e.clientX; startY = e.clientY; originX = x; originY = y;
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      x = originX + (e.clientX - startX);
      y = originY + (e.clientY - startY);
      render();
    });
    window.addEventListener('mouseup', () => { dragging = false; viewport.classList.remove('dragging'); });
    viewport.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY < 0 ? 0.08 : -0.08;
      scale = clampScale(scale + delta);
      render();
    }, { passive: false });
    document.getElementById('zoomIn').addEventListener('click', () => { scale = clampScale(scale + 0.08); render(); });
    document.getElementById('zoomOut').addEventListener('click', () => { scale = clampScale(scale - 0.08); render(); });
    document.getElementById('reset').addEventListener('click', fitToViewport);
    window.addEventListener('resize', fitToViewport);
    fitToViewport();
  </script>
</body>
</html>
